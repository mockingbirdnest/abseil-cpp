name: Build

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:

env:
  PRINCIPIA_HEADERS_ABSEIL: absl
  PRINCIPIA_MSVC_ABSEIL: msvc
  PRINCIPIA_SOLUTION_ABSEIL: msvc/abseil-cpp.slnf

jobs:
  build:
    runs-on: windows-latest
    strategy:
        matrix:
          configuration: [Debug, Release]
    steps:
    - name: Checkout source files
      uses: actions/checkout@v3

    - name: Checkout googletest source files
      uses: mockingbirdnest/actions/windows/checkout_googletest@main

    - name: Checkout re2 source files
      uses: mockingbirdnest/actions/windows/checkout_re2@main

    - name: Initialize build environment
      uses: mockingbirdnest/actions/windows/initialize_build@main
      with:
        configuration: ${{ matrix.configuration }}

    - name: Rebuild ${{ matrix.configuration }}
      uses: mockingbirdnest/actions/windows/rebuild@main
      with:
        configuration: ${{ matrix.configuration }}
        solution_glob: ${{ env.PRINCIPIA_SOLUTION_ABSEIL }}

    - name: Upload artifact
      uses: mockingbirdnest/actions/windows/upload_artifact@main
      with:
        name: abseil-cpp
        configuration: ${{ matrix.configuration }}
        headers_directory: ${{ env.PRINCIPIA_HEADERS_ABSEIL }}
        solution_directory: ${{ env.PRINCIPIA_MSVC_ABSEIL }}
